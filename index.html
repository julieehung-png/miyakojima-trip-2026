<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --sea-deep:#0A4E6E; --sea:#0C6E9C; --turq:#17B9C6; --lagoon:#7FE0DD; --pool:#12A6C4;
    --azure:#3D67C9; --cyan:#33AEC9; --violet:#8E76D6; --indigo:#4B57A0; --navy:#24406E; --slate:#5B7883;
    --turq-soft:#CDEBEF; --sun:#FFD66B;
    --sand:#FBF6EC; --card:#FFFFFF; --ink:#08313F; --muted:#5B7883; --hair:#E7DFCF;
    --shadow:0 10px 30px -14px rgba(8,49,63,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--sand);color:var(--ink);
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Hiragino Sans","Microsoft JhengHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--sand);overflow-x:hidden}

  /* Map hero */
  .maphero{position:relative;height:38vh;min-height:250px;max-height:340px;background:#bfe0ea}
  #map{position:absolute;inset:0;width:100%;height:100%;z-index:1}
  .map-overlay{position:absolute;left:0;right:0;bottom:0;z-index:5;pointer-events:none;
    padding:36px 20px 26px;color:#fff;background:linear-gradient(transparent, rgba(6,40,54,.74) 62%)}
  .map-overlay .eyebrow{font-family:"Zen Maru Gothic";font-weight:700;letter-spacing:.34em;font-size:10.5px;opacity:.9;text-transform:uppercase}
  .map-overlay h1{margin:2px 0 4px;font-family:"Zen Maru Gothic","Noto Sans TC",sans-serif;font-weight:900;font-size:30px;letter-spacing:.04em}
  .map-overlay .sub{font-family:"DM Mono",monospace;font-size:12px;opacity:.92;display:flex;gap:12px;flex-wrap:wrap}
  .map-hint{position:absolute;top:calc(env(safe-area-inset-top) + 10px);right:12px;z-index:5;
    background:rgba(8,49,63,.62);color:#fff;font-size:11px;font-weight:500;
    padding:5px 10px;border-radius:999px;backdrop-filter:blur(4px);pointer-events:none;letter-spacing:.02em}
  .wavecut{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:20px;z-index:6;pointer-events:none;display:block;filter:drop-shadow(0 -2px 6px rgba(8,49,63,.12))}
  .leaflet-container{background:#bfe0ea;font-family:inherit}
  .pin{width:100%;height:100%;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    border:2.5px solid #fff;box-shadow:0 3px 8px rgba(8,49,63,.4);display:flex;align-items:center;justify-content:center}
  .pin b{transform:rotate(-45deg);color:#fff;font-family:"DM Mono",monospace;font-weight:500;font-size:12px;line-height:1}
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:var(--shadow)}
  .leaflet-popup-content{margin:12px 14px;font-family:inherit}
  .pop h4{margin:0 0 2px;font-size:15px;font-weight:700;color:var(--ink)}
  .pop .pm{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
  .pop .pb{display:flex;gap:6px}
  .pop a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12.5px;font-weight:700;
    padding:6px 10px;border-radius:9px;border:1.5px solid var(--hair);color:var(--sea-deep)}
  .pop a.call{color:#0E93A6;border-color:var(--turq-soft)}

  /* Day nav */
  .daynav{position:sticky;top:0;z-index:20;background:rgba(251,246,236,.95);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);display:flex;gap:8px;overflow-x:auto;padding:11px 16px;scrollbar-width:none}
  .daynav::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1.5px solid var(--hair);background:var(--card);color:var(--muted);
    border-radius:999px;padding:7px 15px 6px;font-weight:700;font-size:13px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;line-height:1.15;transition:.18s ease;font-family:"Zen Maru Gothic"}
  .pill small{font-family:"DM Mono",monospace;font-weight:400;font-size:10px;opacity:.75;letter-spacing:.02em}
  .pill[aria-selected="true"]{background:var(--sea-deep);border-color:var(--sea-deep);color:#fff;box-shadow:var(--shadow)}
  .pill:focus-visible{outline:3px solid var(--turq);outline-offset:2px}

  .tripmap{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--sea-deep);color:#fff;
    text-decoration:none;font-weight:700;font-size:13.5px;padding:11px;letter-spacing:.01em}
  .tripmap svg{width:16px;height:16px}
  .tripmap:focus-visible{outline:3px solid var(--turq);outline-offset:-3px}
  /* Lead + timeline */
  main{padding:22px 18px 40px}
  .lead{position:relative;margin-bottom:20px}
  .lead .num{font-family:"Zen Maru Gothic";font-weight:900;font-size:72px;line-height:.86;color:var(--sea);
    letter-spacing:-.01em;display:flex;align-items:baseline;gap:8px}
  .lead .num span{font-size:22px;color:var(--turq)}
  .lead .date{font-family:"DM Mono",monospace;font-size:12.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
  .lead .theme{font-family:"Zen Maru Gothic","Noto Sans TC",sans-serif;font-weight:900;font-size:20px;margin-top:3px;letter-spacing:.03em}
  .lead-art{position:absolute;right:2px;top:-4px;width:132px;height:76px;pointer-events:none}
  .lead-art .bob2{animation:bob 3.4s ease-in-out .9s infinite}
  .lead-art .bob{animation:bob 3.4s ease-in-out infinite}
  .routebtn{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:linear-gradient(135deg,var(--sea),var(--turq));color:#fff;text-decoration:none;font-weight:700;font-size:15px;
    padding:14px;border-radius:15px;box-shadow:0 12px 26px -12px rgba(12,110,156,.7);transition:transform .12s ease}
  .routebtn:active{transform:translateY(1px) scale(.995)}
  .routebtn:focus-visible{outline:3px solid var(--sea-deep);outline-offset:2px}
  .routebtn svg{width:18px;height:18px;flex:0 0 auto}

  .timeline{position:relative;margin-top:24px;padding-left:64px}
  .timeline::before{content:"";position:absolute;left:52px;top:6px;bottom:12px;width:2px;
    background:linear-gradient(var(--sea-deep),var(--turq),var(--lagoon));border-radius:2px}
  .stop{position:relative;margin-bottom:16px;animation:rise .5s ease both}
  .stop .clock{position:absolute;left:-64px;top:1px;width:44px;text-align:right;
    font-family:"DM Mono",monospace;font-size:12.5px;color:var(--muted);font-weight:500}
  .dot{position:absolute;left:-16px;top:5px;width:14px;height:14px;border-radius:50%;
    background:var(--cat,var(--sea));border:3px solid var(--sand);box-shadow:0 0 0 2px var(--cat,var(--sea))}
  .card{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;color:#fff;
    background:var(--cat,var(--sea));padding:3px 9px;border-radius:999px;margin-bottom:8px}
  .card h3{margin:0;font-size:16.5px;font-weight:700}
  .card .en{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-top:1px}
  .meta{margin-top:9px;display:flex;flex-direction:column;gap:5px}
  .meta .row{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;color:var(--muted);line-height:1.5}
  .meta .row svg{width:14px;height:14px;flex:0 0 auto;margin-top:3px;opacity:.85}
  .meta .row.tip{color:var(--ink);background:#FFF8E5;border:1px solid #F2DFC0;border-radius:11px;padding:9px 10px;margin-top:3px}
  .meta .row.tip svg{color:#C98A00;opacity:1}
  .actions{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap}
  .maplink{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;text-decoration:none;color:var(--sea-deep);
    font-weight:700;font-size:13.5px;border:1.5px solid var(--hair);padding:9px 14px;border-radius:12px;transition:.15s ease}
  .maplink:active{background:var(--sand)}
  .maplink:focus-visible{outline:3px solid var(--turq);outline-offset:2px}
  .maplink svg{width:14px;height:14px}
  .maplink.call{color:#0E93A6;border-color:var(--turq-soft)}
  .maplink.call:active{background:#EAF7F9}

  /* 每日結尾的小海浪 */
  .day-end{display:flex;justify-content:center;padding:10px 0 0}
  .day-end svg{width:120px;height:20px;opacity:.75}

  /* 備案餐廳 */
  .alts{margin-top:11px;border-top:1px dashed var(--hair);padding-top:3px}
  .alts summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--sea-deep);padding:7px 0 5px;list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
  .alts summary::-webkit-details-marker{display:none}
  .alts summary::before{content:"▸";display:inline-block;transition:transform .15s ease;color:var(--turq)}
  .alts[open] summary::before{transform:rotate(90deg)}
  .alt{background:var(--sand);border:1px solid var(--hair);border-radius:11px;padding:9px 11px;margin-bottom:7px}
  .alt-t{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .alt-t b{font-size:13.5px}
  .alt-t .star{font-family:"DM Mono",monospace;font-size:11.5px;color:#C98A00;white-space:nowrap;font-weight:500}
  .alt-t .star i{font-style:normal;color:var(--muted)}
  .alt-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--sea-deep);background:var(--turq-soft);
    border-radius:999px;padding:2px 8px;margin-right:6px;vertical-align:1px;letter-spacing:.04em;white-space:nowrap}
  .alt-d{font-size:12px;color:var(--muted);margin:3px 0 7px;line-height:1.5}
  .alt-b{display:flex;gap:10px}
  .alt-b a{display:inline-flex;align-items:center;gap:4px;text-decoration:none;font-size:12px;font-weight:700;color:var(--sea-deep)}
  .alt-b a.c{color:#0E93A6}
  .alt-b a svg{width:12px;height:12px}

  /* 必買 & 注意 分頁 */
  .pill.list[aria-selected="true"]{background:var(--violet);border-color:var(--violet)}
  .info .pagehead{margin-bottom:16px}
  .info .pagehead .big{font-family:"Zen Maru Gothic";font-weight:900;font-size:26px;color:var(--sea)}
  .info .pagehead .sub2{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
  .progwrap{margin-top:12px}
  .progtxt{display:flex;justify-content:space-between;font-family:"DM Mono",monospace;font-size:11.5px;color:var(--muted);margin-bottom:5px}
  .progbar{height:8px;background:#EAE2D1;border-radius:99px;overflow:hidden}
  .progbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--sea),var(--turq));border-radius:99px;transition:width .3s ease}
  .info .sec{background:#fff;border:1px solid var(--hair);border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .info .sec h3{margin:0 0 4px;font-size:15.5px;display:flex;align-items:center;gap:7px}
  .info .sec .hint{font-size:11.5px;color:var(--muted);margin:0 0 6px}
  .chk{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--hair)}
  .chk:last-child{border-bottom:none;padding-bottom:2px}
  .chk input{width:18px;height:18px;margin-top:2px;accent-color:var(--sea);flex:0 0 auto}
  .chk .w{font-size:13.5px;line-height:1.5}
  .chk .w small{display:block;color:var(--muted);font-size:11.5px;line-height:1.45}
  .chk input:checked+.w{opacity:.42;text-decoration:line-through}
  .note{display:flex;gap:9px;padding:8px 0;font-size:13px;line-height:1.55;border-bottom:1px dashed var(--hair)}
  .note:last-child{border-bottom:none;padding-bottom:2px}
  .note .em{flex:0 0 auto;font-size:15px;line-height:1.4}

  footer{padding:6px 20px calc(env(safe-area-inset-bottom) + 34px);color:var(--muted);font-size:12px;line-height:1.7}
  footer .tips{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:14px 16px;margin-bottom:16px}
  footer .tips b{color:var(--ink)}
  footer .beach{display:flex;justify-content:center;margin-bottom:10px}
  footer .beach svg{width:230px;height:70px}
  footer .beach .bob{animation:bob 3.4s ease-in-out infinite}
  footer .beach .drift{animation:drift 5s ease-in-out infinite}
  footer .sig{text-align:center;font-family:"DM Mono",monospace;letter-spacing:.12em;font-size:10.5px;opacity:.7;text-transform:uppercase}

  .badge.bkd{background:#FFD66B;color:#6B4E00;margin-left:6px;border:1px solid #F0C24A}

  /* 工具箱 hub */
  .pill.toolbox[aria-selected="true"]{background:var(--violet);border-color:var(--violet)}
  .hubhead{margin:2px 0 14px}
  .hubhead .big{font-family:"Zen Maru Gothic";font-weight:900;font-size:26px;color:var(--sea)}
  .hubhead .sub2{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
  .hub{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .hcard{display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:#fff;border:1px solid var(--hair);
    border-radius:16px;padding:16px 15px 14px;cursor:pointer;text-align:left;box-shadow:var(--shadow);transition:transform .12s}
  .hcard:active{transform:scale(.97)}
  .hcard .hi{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
  .hcard b{font-size:15px;color:var(--ink)}
  .hcard small{font-size:11px;color:var(--muted);line-height:1.45}
  .backhub{display:inline-flex;align-items:center;gap:4px;border:1.5px solid var(--hair);background:#fff;color:var(--sea-deep);
    font-weight:800;font-size:13px;border-radius:999px;padding:7px 14px;cursor:pointer;margin-bottom:14px}
  .backhub:active{background:var(--turq-soft)}

  /* 旅程分頁 */
  .pill.trip[aria-selected="true"]{background:var(--sea);border-color:var(--sea)}
  .fcard{display:flex;flex-direction:column;gap:2px;background:var(--sand);border:1px solid var(--hair);border-radius:13px;padding:11px 13px;margin-bottom:8px}
  .fcard .frow{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .fcard .fno{font-family:"DM Mono",monospace;font-weight:700;color:var(--sea-deep);font-size:13px}
  .fbadge{background:var(--turq-soft);color:var(--sea-deep);font-weight:800;font-size:10.5px;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .fseg{display:flex;align-items:center;gap:10px;margin-top:5px}
  .fseg .pt{display:flex;flex-direction:column}
  .fseg .pt b{font-family:"DM Mono",monospace;font-size:19px;letter-spacing:.01em}
  .fseg .pt span{font-size:10.5px;color:var(--muted);font-family:"DM Mono",monospace;letter-spacing:.08em}
  .fseg .arrow{flex:1;text-align:center;color:var(--turq);font-size:14px;border-bottom:1.5px dashed var(--turq);line-height:.4;margin:0 2px}
  .hotelrow{display:flex;gap:9px;padding:7px 0;font-size:13px;border-bottom:1px dashed var(--hair);align-items:baseline}
  .hotelrow:last-child{border-bottom:none}
  .hotelrow .hl{flex:0 0 74px;color:var(--muted);font-size:11.5px;font-family:"DM Mono",monospace;letter-spacing:.06em}
  .hotelrow b{font-family:"DM Mono",monospace;font-weight:600}
  .wxgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .wx{background:var(--sand);border:1px solid var(--hair);border-radius:13px;padding:10px 6px;text-align:center}
  .wx.today{outline:2px solid var(--turq);background:var(--turq-soft)}
  .wx .d{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted)}
  .wx .e{font-size:26px;line-height:1.3;margin:2px 0}
  .wx .t{font-family:"DM Mono",monospace;font-size:12px}
  .wx .t b{color:#C0392B;font-weight:600}
  .wx .t span{color:var(--sea-deep)}
  .wx .r{font-size:10.5px;color:var(--sea-deep);margin-top:2px}
  .wxnote{font-size:11.5px;color:var(--muted);margin-top:9px;line-height:1.5}

  /* 工具分頁 */
  .pill.tools[aria-selected="true"]{background:var(--turq);border-color:var(--turq)}
  .tool .sec{background:#fff;border:1px solid var(--hair);border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .tool h3{margin:0 0 10px;font-size:15.5px}
  .fx{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
  .fx .cur{display:flex;flex-direction:column;gap:4px}

  .rate{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
  .rate input{width:90px;padding:6px 8px;font-size:13px}
  .payseg{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--hair);border-radius:13px;overflow:hidden;margin-bottom:10px}
  .payseg button{border:none;background:#fff;padding:13px 0;font-weight:900;font-size:15px;cursor:pointer;color:var(--muted);transition:.12s}
  .payseg button.onJ{background:#8E76D6;color:#fff}
  .payseg button.onS{background:#0C6E9C;color:#fff}
  .amtbox{position:relative;margin-bottom:8px}
  .amtbox .yen{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:"DM Mono",monospace;font-size:20px;color:var(--muted)}
  .curbtn{position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:2;
    border:1.5px solid var(--turq);background:var(--turq-soft);color:var(--sea-deep);
    font-family:"DM Mono",monospace;font-weight:700;font-size:14px;border-radius:9px;padding:7px 9px;cursor:pointer;min-width:46px}
  .curbtn:active{background:var(--turq);color:#fff}
  .amtbox input{width:100%;box-sizing:border-box;border:1.5px solid var(--hair);border-radius:13px;background:var(--sand);

  .paybar i{display:block;height:100%}
  .paylbl{display:flex;justify-content:space-between;font-size:11.5px;font-family:"DM Mono",monospace;color:var(--muted);margin-bottom:8px}
  .lgl{border-top:1px dashed var(--hair)}

/* ---------- Map：Esri 海洋圖層，藍海 + 島嶼輪廓 ---------- */
const map=L.map('map',{zoomControl:true,attributionControl:true,scrollWheelZoom:false,zoomSnap:.5,minZoom:9,maxZoom:18,zoomAnimation:false});
map.fitBounds(L.latLngBounds(days[0].stops.map(x=>[x.lat,x.lng])),{padding:[46,46],maxZoom:13,animate:false});
setTimeout(()=>map.options.zoomAnimation=true,1200); // 開場定位完成後恢復縮放動畫
// 主圖磚：CARTO Voyager（藍海、清楚島嶼輪廓）；載不出來時自動切換到 OpenStreetMap
let base=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
let tswitched=false,terr=0;
base.on('tileerror',()=>{ if(tswitched)return; if(++terr>=3){tswitched=true;map.removeLayer(base);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);} });

const allPts=[];
const fadeLayer=L.layerGroup().addTo(map);
days.forEach(d=>d.stops.forEach(s=>{
  allPts.push([s.lat,s.lng]);
  L.circleMarker([s.lat,s.lng],{radius:3.4,color:'#fff',weight:1,fillColor:'#0C6E9C',fillOpacity:.7,opacity:.7}).addTo(fadeLayer);
}));
map.fitBounds(L.latLngBounds(allPts),{padding:[30,30]}); // 開場先看整座島

let activeLayer=L.layerGroup().addTo(map);
function pinIcon(hex,seq){return L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,26],popupAnchor:[0,-24],
  html:`<div class="pin" style="background:${hex}"><b>${seq}</b></div>`});}
function popupHtml(s){const ph=s.pid?PHONE[s.pid]:null;
  return `<div class="pop"><h4>${s.name}</h4><div class="pm">${s.t} · ${s.c}</div><div class="pb">
    <a target="_blank" rel="noopener" href="${D(s.lat,s.lng,s.pid)}">Google 地圖</a>
    ${ph?`<a class="call" href="tel:${tel(ph)}">撥號</a>`:''}</div></div>`;}
function updateMap(i){
  activeLayer.remove();activeLayer=L.layerGroup().addTo(map);
  const d=days[i],pts=[],line=d.stops.map(s=>[s.lat,s.lng]);
  L.polyline(line,{color:'#0A4E6E',weight:3,opacity:.6,dashArray:'1 9',lineCap:'round'}).addTo(activeLayer);
  d.stops.forEach((s,k)=>{L.marker([s.lat,s.lng],{icon:pinIcon(HEX[s.c]||'#0C6E9C',k+1)}).addTo(activeLayer).bindPopup(popupHtml(s));pts.push([s.lat,s.lng]);});
  curFit={pts,pad:46,maxZoom:13};
  map.fitBounds(L.latLngBounds(pts),{padding:[46,46],maxZoom:13}); // 收住縮放，保留整島輪廓
}
/* 修正：容器尺寸定稿後重新置中（避免初次載入視野偏移） */
let curFit={pts:allPts,pad:30,maxZoom:18};
function refit(){map.invalidateSize();
  map.fitBounds(L.latLngBounds(curFit.pts),{padding:[curFit.pad,curFit.pad],maxZoom:curFit.maxZoom,animate:false});}
setTimeout(refit,300);setTimeout(refit,900);
let __rz;window.addEventListener('resize',()=>{clearTimeout(__rz);__rz=setTimeout(refit,200);});
window.addEventListener('orientationchange',()=>setTimeout(refit,350));

/* ---------- UI ---------- */
function render(i){
  const d=days[i],main=document.getElementById('main');
  const stopsHtml=d.stops.map(s=>{
    const color=CAT[s.c]||'var(--sea)',meta=[];
    if(s.drive)meta.push(`<div class="row">${IC.car}<span>${s.drive}</span></div>`);
    if(s.open)meta.push(`<div class="row">${IC.clock}<span>${s.open}</span></div>`);
    if(s.tip)meta.push(`<div class="row tip">${IC.tip}<span>${s.tip}</span></div>`);
    const phone=s.pid?PHONE[s.pid]:null;
    const altLabel=s.c==='冰·咖啡'?'更多咖啡 & 甜點':(s.c==='午餐'||s.c==='晚餐'||s.c==='宵夜')?'更多餐廳備案':'更多備案';
    const altsHtml=s.alts?`<details class="alts"><summary>${altLabel}（${s.alts.length} 間 · Google 高評價）</summary>
      ${s.alts.map(a=>`<div class="alt">
        <div class="alt-t"><b>${a.tag?`<span class="alt-tag">${a.tag}</span>`:''}${a.name}</b><span class="star">★ ${a.rate.toFixed(1)} <i>(${a.cnt})</i></span></div>
        <div class="alt-d">${a.note}</div>
        <div class="alt-b"><a target="_blank" rel="noopener" href="${D(a.lat,a.lng,a.pid)}">${IC.pin} 地圖</a>
        ${a.ph?`<a class="c" href="tel:${tel(a.ph)}">${IC.phone} 撥號</a>`:''}</div>
      </div>`).join('')}</details>`:'';
    return `<div class="stop" style="--cat:${color}">
      <div class="clock">${s.t}</div><div class="dot"></div>
      <div class="card"><span class="badge">${s.c}</span>${s.bk?`<span class="badge bkd">✔ 已預約 ${s.bk}</span>`:''}
        <h3>${s.name}</h3>${s.en?`<div class="en">${s.en}</div>`:''}
        ${meta.length?`<div class="meta">${meta.join('')}</div>`:''}
        <div class="actions">
          <a class="maplink" target="_blank" rel="noopener" href="${D(s.lat,s.lng,s.pid)}">${IC.pin} 地圖</a>
          ${phone?`<a class="maplink call" href="tel:${tel(phone)}">${IC.phone} 撥號</a>`:''}
        </div>${altsHtml}</div></div>`;
  }).join('');
  main.innerHTML=`<div class="lead">${ART_PARASOL}
      <div class="num">${d.n}<span>/ 6</span></div>
      <div class="date">${d.date} · ${d.wd}</div>
      <div class="theme">${d.theme}</div>
      <a class="routebtn" target="_blank" rel="noopener" href="${d.route}">${IC.route} 開啟當天 Google 導航路線</a>
    </div><div class="timeline">${stopsHtml}</div>${ART_WAVE}`;
  updateMap(i);
}

const chkState={};

  const t=document.getElementById('progtxt'),b=document.getElementById('progfill');

}

  get(k,dv){try{const v=localStorage.getItem('miyako_'+k);return v==null?dv:JSON.parse(v);}catch(e){return this._m&&k in this._m?this._m[k]:dv;}},
  set(k,v){try{localStorage.setItem('miyako_'+k,JSON.stringify(v));}catch(e){(this._m=this._m||{})[k]=v;}}
};
let fxRate=store.get('rate',0.205);           // 1 JPY = ? TWD（可自行修改）
let ledger=store.get('ledger',[]);            // {who,amt,note,ts}
let curWho=store.get('who','Julie');
const WHOC={'Julie':'#8E76D6','劭':'#0C6E9C'};
const nf=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const nf2=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
let curCur=store.get('cur','JPY');                        // 記帳幣別：JPY 或 TWD
const toTWD=e=>(e.cur==='TWD'?e.amt:e.amt*fxRate);        // 一律折台幣結算
const amtLabel=e=>e.cur==='TWD'
  ?`NT$${nf(e.amt)}`
  :`¥${nf(e.amt)} <small style="color:var(--muted)">≈NT$${nf(e.amt*fxRate)}</small>`;

function settleCalc(){                                    // 全部以 TWD 計
  const tot=ledger.reduce((a,e)=>a+toTWD(e),0);
  const j=ledger.filter(e=>e.who==='Julie').reduce((a,e)=>a+toTWD(e),0);
  const st=ledger.filter(e=>e.who==='劭').reduce((a,e)=>a+toTWD(e),0);
  const half=tot/2, diff=(j-st)/2;   // >0：劭 要給 Julie（TWD）
  return {tot,j,st,half,diff};
}

function loadWx(){
  const g=document.getElementById('wxgrid');if(!g)return;
  const cache=store.get('wx',null);
  const draw=d=>{
    const today=new Date().toISOString().slice(0,10);
    g.innerHTML=d.time.map((t,i)=>{
      const dd=new Date(t+'T00:00:00');
      const lbl=(dd.getMonth()+1)+'/'+dd.getDate()+'（'+'日一二三四五六'[dd.getDay()]+'）';
      return `<div class="wx ${t===today?'today':''}">
        <div class="d">${lbl}</div><div class="e">${WXE(d.weathercode[i])}</div>
        <div class="t"><b>${Math.round(d.temperature_2m_max[i])}°</b> <span>${Math.round(d.temperature_2m_min[i])}°</span></div>
        <div class="r">💧${d.precipitation_probability_max[i]}%</div></div>`;
    }).join('');
  };
  if(cache&&Date.now()-cache.ts<3*3600e3){draw(cache.d);return;}
  fetch('https://api.open-meteo.com/v1/forecast?latitude=24.805&longitude=125.281&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&start_date=2026-07-20&end_date=2026-07-25')
    .then(r=>r.json()).then(j=>{store.set('wx',{ts:Date.now(),d:j.daily});draw(j.daily);})
    .catch(()=>{if(cache)draw(cache.d);else g.innerHTML='<div style="grid-column:1/-1;color:var(--muted);font-size:13px;padding:8px 0">暫時無法取得天氣（需要網路），出發前再打開更新即可。</div>';});
}

function renderLg(){
  const list=document.getElementById('lgList'),st=document.getElementById('lgSettle');
  if(!list)return;
  const eD=e=>e.d||new Date(e.ts).toISOString().slice(0,10);
  const fmtD=d=>{const x=new Date(d+'T00:00:00');return (x.getMonth()+1)+'/'+x.getDate()+'（'+'日一二三四五六'[x.getDay()]+'）';};
  if(ledger.length){
    const idx=ledger.map((e,i)=>({e,i})).sort((a,b)=>eD(a.e)===eD(b.e)?a.e.ts-b.e.ts:(eD(a.e)<eD(b.e)?-1:1));
    let html='',last='';
    idx.forEach(({e,i})=>{
      const d=eD(e);
      if(d!==last){html+=`<div class="lgd">${fmtD(d)}</div>`;last=d;}
      html+=`<div class="lgi">
        <span class="w8" style="background:${WHOC[e.who]}">${e.who}</span>
        <span>${e.note}</span>
        <span class="amt">${amtLabel(e)}</span>
        <button class="del" data-i="${i}" aria-label="刪除">✕</button>
      </div>`;
    });
    list.innerHTML=html;
  }else list.innerHTML='<div style="padding:12px 0;color:var(--muted);font-size:13px">還沒有記錄，上面記第一筆吧</div>';
  list.querySelectorAll('.del').forEach(b=>b.onclick=()=>{ledger.splice(+b.dataset.i,1);store.set('ledger',ledger);renderLg();});
  const c=settleCalc();
  const bar=document.getElementById('lgBar');
  if(bar)bar.innerHTML=ledger.length&&c.tot>0?`<div class="paybar">
      <i style="width:${c.j/c.tot*100}%;background:#8E76D6"></i>
      <i style="width:${c.st/c.tot*100}%;background:#0C6E9C"></i></div>
    <div class="paylbl"><span style="color:#8E76D6">Julie NT$${nf(c.j)}</span><span style="color:#0C6E9C">劭 NT$${nf(c.st)}</span></div>`:'';
  const pay=c.diff>0?{from:'劭',fc:'S',to:'Julie',tc:'J',amt:c.diff}:{from:'Julie',fc:'J',to:'劭',tc:'S',amt:-c.diff};
  st.innerHTML=ledger.length?`
    <div class="stat"><span>總支出（台幣結算）</span><b>NT$ ${nf(c.tot)}</b><i>≈ ¥ ${nf(c.tot/fxRate)}</i></div>
    ${Math.abs(c.diff)<1
      ?`<div class="even">🎉 剛好平帳，誰都不用給誰</div>`
      :`<div class="transfer">
          <div class="tsent"><b class="n${pay.fc}">${pay.from}</b><span class="tgive">要給</span><b class="n${pay.tc}">${pay.to}</b></div>
          <b class="tamt">NT$ ${nf(pay.amt)}</b>
          <i class="tntd">≈ ¥ ${nf(pay.amt/fxRate)}</i>
        </div>`}`:'';
}
function exportXlsx(){
  const btn=document.getElementById('lgXls');btn.disabled=true;btn.textContent='產生中…';
  const build=()=>{
    const c=settleCalc();
    const rows=[['日期','付款人','項目','幣別','金額','折合台幣 NT$（匯率 '+fxRate+'）']];
    [...ledger].sort((a,b)=>((a.d||'')<(b.d||'')?-1:1)).forEach(e=>rows.push([e.d||new Date(e.ts).toISOString().slice(0,10),e.who,e.note,(e.cur==='TWD'?'台幣':'日幣'),e.amt,Math.round(toTWD(e))]));
    rows.push([],['總支出（台幣結算）','','','','',Math.round(c.tot)],
      ['Julie 已付','','','','',Math.round(c.j)],['劭 已付','','','','',Math.round(c.st)],
      ['結算','',(Math.abs(c.diff)<1?'平帳':c.diff>0?'劭 → Julie':'Julie → 劭'),'','',Math.round(Math.abs(c.diff))]);
    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:12},{wch:8},{wch:22},{wch:6},{wch:10},{wch:20}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'宮古島旅費');
    XLSX.writeFile(wb,'miyako-expenses.xlsx');
    btn.disabled=false;btn.textContent='📥 匯出 Excel（.xlsx）';
  };
  if(window.XLSX){build();return;}
  const sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  sc.onload=build;
  sc.onerror=()=>{ // 離線備援：CSV（Excel 可直接開）
    const c=settleCalc();
    let csv='\ufeff日期,付款人,項目,幣別,金額,折合台幣\n';
    [...ledger].sort((a,b)=>((a.d||'')<(b.d||'')?-1:1)).forEach(e=>{csv+=`${e.d||new Date(e.ts).toISOString().slice(0,10)},${e.who},"${e.note}",${e.cur==='TWD'?'台幣':'日幣'},${e.amt},${Math.round(toTWD(e))}\n`;});
    csv+=`\n總支出(台幣),,,,,${Math.round(c.tot)}\n結算,,${c.diff>0?'劭→Julie':'Julie→劭'},,,${Math.round(Math.abs(c.diff))}\n`;
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='miyako-expenses.csv';a.click();
    btn.disabled=false;btn.textContent='📥 匯出 Excel（.xlsx）';
  };
  document.head.appendChild(sc);
}
