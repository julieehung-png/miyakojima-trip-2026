<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --sea-deep:#0A4E6E; --sea:#0C6E9C; --turq:#17B9C6; --lagoon:#7FE0DD; --pool:#12A6C4;
    --azure:#3D67C9; --cyan:#33AEC9; --violet:#8E76D6; --indigo:#4B57A0; --navy:#24406E; --slate:#5B7883;
    --turq-soft:#CDEBEF;
    --sand:#FBF6EC; --card:#FFFFFF; --ink:#08313F; --muted:#5B7883; --hair:#E7DFCF;
    --shadow:0 10px 30px -14px rgba(8,49,63,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--sand);color:var(--ink);
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Hiragino Sans","Microsoft JhengHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--sand);overflow-x:hidden}

  /* Map hero */
  .maphero{position:relative;height:48vh;min-height:280px;max-height:400px;background:#bfe0ea}
  #map{position:absolute;inset:0;width:100%;height:100%;z-index:1}
  .map-overlay{position:absolute;left:0;right:0;bottom:0;z-index:5;pointer-events:none;
    padding:36px 20px 14px;color:#fff;background:linear-gradient(transparent, rgba(6,40,54,.74) 62%)}
  .map-overlay .eyebrow{font-family:"Zen Maru Gothic";font-weight:700;letter-spacing:.34em;font-size:10.5px;opacity:.9;text-transform:uppercase}
  .map-overlay h1{margin:2px 0 4px;font-weight:900;font-size:22px;letter-spacing:.02em}
  .map-overlay .sub{font-family:"DM Mono",monospace;font-size:12px;opacity:.92;display:flex;gap:12px;flex-wrap:wrap}
  .map-hint{position:absolute;top:calc(env(safe-area-inset-top) + 10px);right:12px;z-index:5;
    background:rgba(8,49,63,.62);color:#fff;font-size:11px;font-weight:500;
    padding:5px 10px;border-radius:999px;backdrop-filter:blur(4px);pointer-events:none;letter-spacing:.02em}
  .leaflet-container{background:#bfe0ea;font-family:inherit}
  .pin{width:100%;height:100%;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    border:2.5px solid #fff;box-shadow:0 3px 8px rgba(8,49,63,.4);display:flex;align-items:center;justify-content:center}
  .pin b{transform:rotate(-45deg);color:#fff;font-family:"DM Mono",monospace;font-weight:500;font-size:12px;line-height:1}
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:var(--shadow)}
  .leaflet-popup-content{margin:12px 14px;font-family:inherit}
  .pop h4{margin:0 0 2px;font-size:15px;font-weight:700;color:var(--ink)}
  .pop .pm{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
  .pop .pb{display:flex;gap:6px}
  .pop a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12.5px;font-weight:700;
    padding:6px 10px;border-radius:9px;border:1.5px solid var(--hair);color:var(--sea-deep)}
  .pop a.call{color:#0E93A6;border-color:var(--turq-soft)}

  /* Day nav */
  .daynav{position:sticky;top:0;z-index:20;background:rgba(251,246,236,.95);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);display:flex;gap:8px;overflow-x:auto;padding:11px 16px;scrollbar-width:none}
  .daynav::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1.5px solid var(--hair);background:var(--card);color:var(--muted);
    border-radius:999px;padding:7px 15px 6px;font-weight:700;font-size:13px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;line-height:1.15;transition:.18s ease;font-family:"Zen Maru Gothic"}
  .pill small{font-family:"DM Mono",monospace;font-weight:400;font-size:10px;opacity:.75;letter-spacing:.02em}

  .tripmap{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--sea-deep);color:#fff;
    text-decoration:none;font-weight:700;font-size:13.5px;padding:11px;letter-spacing:.01em}
  .tripmap svg{width:16px;height:16px}
  .tripmap:focus-visible{outline:3px solid var(--turq);outline-offset:-3px}

  .lead .num{font-family:"Zen Maru Gothic";font-weight:900;font-size:72px;line-height:.86;color:var(--sea);
    letter-spacing:-.01em;display:flex;align-items:baseline;gap:8px}

  .lead .theme{font-weight:900;font-size:20px;margin-top:3px;letter-spacing:.01em}

    padding:14px;border-radius:15px;box-shadow:0 12px 26px -12px rgba(12,110,156,.7);transition:transform .12s ease}

  .routebtn:focus-visible{outline:3px solid var(--sea-deep);outline-offset:2px}
  .routebtn svg{width:18px;height:18px;flex:0 0 auto}

  .timeline{position:relative;margin-top:24px;padding-left:64px}
  .timeline::before{content:"";position:absolute;left:52px;top:6px;bottom:12px;width:2px;
    background:linear-gradient(var(--sea-deep),var(--turq),var(--lagoon));border-radius:2px}
  .stop{position:relative;margin-bottom:16px;animation:rise .5s ease both}
  .stop .clock{position:absolute;left:-64px;top:1px;width:44px;text-align:right;
    font-family:"DM Mono",monospace;font-size:12.5px;color:var(--muted);font-weight:500}
  .dot{position:absolute;left:-16px;top:5px;width:14px;height:14px;border-radius:50%;
    background:var(--cat,var(--sea));border:3px solid var(--sand);box-shadow:0 0 0 2px var(--cat,var(--sea))}
  .card{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;color:#fff;

  .card h3{margin:0;font-size:16.5px;font-weight:700}
  .card .en{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-top:1px}
  .meta{margin-top:9px;display:flex;flex-direction:column;gap:5px}

  .meta .row svg{width:14px;height:14px;flex:0 0 auto;margin-top:3px;opacity:.85}
  .meta .row.tip{color:var(--ink)}
  .actions{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap}
  .maplink{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--sea-deep);
    font-weight:700;font-size:13px;border:1.5px solid var(--hair);padding:7px 12px;border-radius:11px;transition:.15s ease}
  .maplink:active{background:var(--sand)}
  .maplink:focus-visible{outline:3px solid var(--turq);outline-offset:2px}
  .maplink svg{width:14px;height:14px}
  .maplink.call{color:#0E93A6;border-color:var(--turq-soft)}
  .maplink.call:active{background:#EAF7F9}

  /* 備案餐廳 */
  .alts{margin-top:11px;border-top:1px dashed var(--hair);padding-top:3px}
  .alts summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--sea-deep);padding:7px 0 5px;list-style:none;display:flex;align-items:center;gap:6px;user-select:none}

  .alts summary::before{content:"▸";display:inline-block;transition:transform .15s ease;color:var(--turq)}
  .alts[open] summary::before{transform:rotate(90deg)}

  .alt-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--sea-deep);background:var(--turq-soft);

  .alt-b{display:flex;gap:10px}
  .alt-b a{display:inline-flex;align-items:center;gap:4px;text-decoration:none;font-size:12px;font-weight:700;color:var(--sea-deep)}
  .alt-b a.c{color:#0E93A6}

  .info .pagehead .sub2{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
  .progwrap{margin-top:12px}
  .progtxt{display:flex;justify-content:space-between;font-family:"DM Mono",monospace;font-size:11.5px;color:var(--muted);margin-bottom:5px}
  .progbar{height:8px;background:#EAE2D1;border-radius:99px;overflow:hidden}
  .progbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--sea),var(--turq));border-radius:99px;transition:width .3s ease}
  .info .sec{background:#fff;border:1px solid var(--hair);border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .info .sec h3{margin:0 0 4px;font-size:15.5px;display:flex;align-items:center;gap:7px}
  .info .sec .hint{font-size:11.5px;color:var(--muted);margin:0 0 6px}
  .chk{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--hair)}
  .chk:last-child{border-bottom:none;padding-bottom:2px}
  .chk input{width:18px;height:18px;margin-top:2px;accent-color:var(--sea);flex:0 0 auto}
  .chk .w{font-size:13.5px;line-height:1.5}
  .chk .w small{display:block;color:var(--muted);font-size:11.5px;line-height:1.45}
  .chk input:checked+.w{opacity:.42;text-decoration:line-through}
  .note{display:flex;gap:9px;padding:8px 0;font-size:13px;line-height:1.55;border-bottom:1px dashed var(--hair)}
  .note:last-child{border-bottom:none;padding-bottom:2px}
  .note .em{flex:0 0 auto;font-size:15px;line-height:1.4}

  footer{padding:6px 20px calc(env(safe-area-inset-bottom) + 34px);color:var(--muted);font-size:12px;line-height:1.7}
  footer .tips{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:14px 16px;margin-bottom:16px}
  footer .tips b{color:var(--ink)}
  footer .sig{text-align:center;font-family:"DM Mono",monospace;letter-spacing:.12em;font-size:10.5px;opacity:.7;text-transform:uppercase}

  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.stop{animation:none}.routebtn{transition:none}}
</style>
</head>

/* ---------- Map：Esri 海洋圖層，藍海 + 島嶼輪廓 ---------- */
const map=L.map('map',{zoomControl:true,attributionControl:true,scrollWheelZoom:false,zoomSnap:.5,minZoom:9,maxZoom:18}).setView([24.80,125.29],11);
// 主圖磚：CARTO Voyager（藍海、清楚島嶼輪廓）；載不出來時自動切換到 OpenStreetMap
let base=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
let tswitched=false,terr=0;
base.on('tileerror',()=>{ if(tswitched)return; if(++terr>=3){tswitched=true;map.removeLayer(base);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);} });

const allPts=[];
const fadeLayer=L.layerGroup().addTo(map);
days.forEach(d=>d.stops.forEach(s=>{
  allPts.push([s.lat,s.lng]);
  L.circleMarker([s.lat,s.lng],{radius:3.4,color:'#fff',weight:1,fillColor:'#0C6E9C',fillOpacity:.7,opacity:.7}).addTo(fadeLayer);
}));
map.fitBounds(L.latLngBounds(allPts),{padding:[30,30]}); // 開場先看整座島

let activeLayer=L.layerGroup().addTo(map);
function pinIcon(hex,seq){return L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,26],popupAnchor:[0,-24],
  html:`<div class="pin" style="background:${hex}"><b>${seq}</b></div>`});}
function popupHtml(s){const ph=s.pid?PHONE[s.pid]:null;
  return `<div class="pop"><h4>${s.name}</h4><div class="pm">${s.t} · ${s.c}</div><div class="pb">
    <a target="_blank" rel="noopener" href="${D(s.lat,s.lng,s.pid)}">Google 地圖</a>
    ${ph?`<a class="call" href="tel:${tel(ph)}">撥號</a>`:''}</div></div>`;}
function updateMap(i){
  activeLayer.remove();activeLayer=L.layerGroup().addTo(map);
  const d=days[i],pts=[],line=d.stops.map(s=>[s.lat,s.lng]);
  L.polyline(line,{color:'#0A4E6E',weight:3,opacity:.6,dashArray:'1 9',lineCap:'round'}).addTo(activeLayer);
  d.stops.forEach((s,k)=>{L.marker([s.lat,s.lng],{icon:pinIcon(HEX[s.c]||'#0C6E9C',k+1)}).addTo(activeLayer).bindPopup(popupHtml(s));pts.push([s.lat,s.lng]);});
  map.fitBounds(L.latLngBounds(pts),{padding:[46,46],maxZoom:13}); // 收住縮放，保留整島輪廓
}
setTimeout(()=>map.invalidateSize(),250);

/* ---------- UI ---------- */
function render(i){
  const d=days[i],main=document.getElementById('main');
  const stopsHtml=d.stops.map(s=>{
    const color=CAT[s.c]||'var(--sea)',meta=[];
    if(s.drive)meta.push(`<div class="row">${IC.car}<span>${s.drive}</span></div>`);
    if(s.open)meta.push(`<div class="row">${IC.clock}<span>${s.open}</span></div>`);
    if(s.tip)meta.push(`<div class="row tip">${IC.tip}<span>${s.tip}</span></div>`);
    const phone=s.pid?PHONE[s.pid]:null;
    const altsHtml=s.alts?`<details class="alts"><summary>備案 & 咖啡參考（${s.alts.length} 間 · Google 高評價）</summary>
      ${s.alts.map(a=>`<div class="alt">
        <div class="alt-t"><b>${a.tag?`<span class="alt-tag">${a.tag}</span>`:''}${a.name}</b><span class="star">★ ${a.rate.toFixed(1)} <i>(${a.cnt})</i></span></div>
        <div class="alt-d">${a.note}</div>
        <div class="alt-b"><a target="_blank" rel="noopener" href="${D(a.lat,a.lng,a.pid)}">${IC.pin} 地圖</a>
        ${a.ph?`<a class="c" href="tel:${tel(a.ph)}">${IC.phone} 撥號</a>`:''}</div>
      </div>`).join('')}</details>`:'';
    return `<div class="stop" style="--cat:${color}">
      <div class="clock">${s.t}</div><div class="dot"></div>
      <div class="card"><span class="badge">${s.c}</span>
        <h3>${s.name}</h3>${s.en?`<div class="en">${s.en}</div>`:''}
        ${meta.length?`<div class="meta">${meta.join('')}</div>`:''}
        <div class="actions">
          <a class="maplink" target="_blank" rel="noopener" href="${D(s.lat,s.lng,s.pid)}">${IC.pin} 地圖</a>
          ${phone?`<a class="maplink call" href="tel:${tel(phone)}">${IC.phone} 撥號</a>`:''}
        </div>${altsHtml}</div></div>`;
  }).join('');
  main.innerHTML=`<div class="lead">
      <div class="num">${d.n}<span>/ 6</span></div>
      <div class="date">${d.date} · ${d.wd}</div>
      <div class="theme">${d.theme}</div>
      <a class="routebtn" target="_blank" rel="noopener" href="${d.route}">${IC.route} 開啟當天 Google 導航路線</a>
    </div><div class="timeline">${stopsHtml}</div>`;
  updateMap(i);
}

const chkState={};
function updateProg(){
  const total=BUY.reduce((n,s)=>n+s.items.length,0);
  const done=Object.values(chkState).filter(Boolean).length;
  const t=document.getElementById('progtxt'),b=document.getElementById('progfill');
  if(t)t.textContent=`${done} / ${total}`;
  if(b)b.style.width=(total?done/total*100:0)+'%';
}
function renderInfo(){
  const main=document.getElementById('main');
  const buyHtml=BUY.map((sec,si)=>`<div class="sec"><h3>${sec.g}</h3>
    ${sec.items.map((it,ii)=>{const id=`b${si}-${ii}`;
      return `<label class="chk"><input type="checkbox" data-id="${id}" ${chkState[id]?'checked':''}><span class="w">${it[0]}<small>${it[1]}</small></span></label>`;}).join('')}
  </div>`).join('');
  const noteHtml=`<div class="sec"><h3>⚠️ 需要注意的事項</h3>
    ${NOTES.map(n=>`<div class="note"><span class="em">${n[0]}</span><span>${n[1]}</span></div>`).join('')}</div>`;
  main.innerHTML=`<div class="info">
    <div class="pagehead"><div class="big">必買 & 注意</div>
    <div class="sub2">Shopping list · Before you go</div>
    <div class="progwrap"><div class="progtxt"><span>採買進度</span><span id="progtxt"></span></div>
    <div class="progbar"><i id="progfill"></i></div></div></div>
    ${buyHtml}${noteHtml}</div>`;
  main.querySelectorAll('.chk input').forEach(el=>el.onchange=()=>{chkState[el.dataset.id]=el.checked;updateProg();});
  updateProg();
  activeLayer.remove();activeLayer=L.layerGroup().addTo(map);
  map.fitBounds(L.latLngBounds(allPts),{padding:[30,30]});
}
function scrollToContent(){
  const nav=document.getElementById('daynav');
  const top=nav.getBoundingClientRect().top+window.scrollY;
  if(window.scrollY>top)window.scrollTo({top,behavior:'smooth'});
}

const nav=document.getElementById('daynav');
days.forEach((d,i)=>{
  const b=document.createElement('button');
  b.className='pill';b.setAttribute('role','tab');b.setAttribute('aria-selected',i===0?'true':'false');
  b.innerHTML=`Day ${d.n}<small>${d.date}</small>`;
  b.onclick=()=>{[...nav.children].forEach(c=>c.setAttribute('aria-selected','false'));
    b.setAttribute('aria-selected','true');render(i);scrollToContent();b.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});};
  nav.appendChild(b);
});
const ib=document.createElement('button');
ib.className='pill list';ib.setAttribute('role','tab');ib.setAttribute('aria-selected','false');
ib.innerHTML=`必買·注意<small>LIST</small>`;
ib.onclick=()=>{[...nav.children].forEach(c=>c.setAttribute('aria-selected','false'));
  ib.setAttribute('aria-selected','true');renderInfo();scrollToContent();ib.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});};
nav.appendChild(ib);
render(0);
</script>
